<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script type="module" src="script.js"></script>
</head>
<body>


    <center><h1 class="heading">Music player</h1></center>


            <!-- S O N G  D I V  -->
    <div class="song-div" id="song-div">

        <div class="songImageDiv">
            <img class="songImage" id="songImage" src="./assets/photos/LS20250416191530.png" alt="">
        </div>

         <p class="currentTime">00:00</p>
        <div class="songTrack">
           <div class="traking"></div>
        </div>
        <p class="totalTime">99:99</p>

        <div class="controls">
            <i class="fa-solid fa-backward"></i>
            <i class="fa-solid fa-pause" id="playPauseBtn"></i>
            <i class="fa-solid fa-forward"></i>
        </div>

    </div>
            <!-- S O N G  D I V  -->
            
    <h2 style="position: absolute; left: 13.5%; font-size: 30px;">Your Songs</h2>
    <div class="ListOfSongs" id="listOfAllSong">
        <!-- <div class="onesong">
            <img class="songOfImage" src="assets\photos\LS20250416191530.png" alt="">
            <p> wanna be yours </p>
        </div> -->
    </div>






</body>
</html>
